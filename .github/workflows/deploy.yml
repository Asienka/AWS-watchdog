name: Deploy to AWS Lambda

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 
      uses: actions/checkout@v6

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v1

    - name: Terraform Format check
      run: terraform fmt -check

    - name: Terraform Validate
      run: terraform validate

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Run Ruff (Python Linting)
      run: |
          pip install ruff
          ruff check .
          ruff format --check .


  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID}}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY}}
        aws-region: us-east-1
        
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: url-monitoring-repository
        IMAGE_TAG: latest
      run: |
        docker build --platform linux/amd64 --provenance=false --output type=docker \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Update Lambda Function
      run: |
        aws lambda update-function-code \
          --function-name url-monitoring-lambda \
          --image-uri ${{ steps.login-ecr.outputs.registry }}/url-monitoring-repository:latest
      
